<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skill Guard - Eval Report</title>
<style>
  :root {
    --bg: #f5f5f5;
    --card-bg: #ffffff;
    --text: #1a1a2e;
    --text-secondary: #6b7280;
    --text-muted: #9ca3af;
    --border: #e5e7eb;
    --header-bg: #0f172a;
    --header-text: #f8fafc;
    --green: #16a34a;
    --green-bg: #dcfce7;
    --green-border: #86efac;
    --red: #dc2626;
    --red-bg: #fef2f2;
    --red-border: #fca5a5;
    --amber: #d97706;
    --amber-bg: #fffbeb;
    --blue: #2563eb;
    --blue-bg: #eff6ff;
    --purple: #7c3aed;
    --purple-bg: #f5f3ff;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh;
  }
  .header {
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    color: var(--header-text); padding: 1.25rem 1.5rem;
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.75rem;
  }
  .header-left h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.025em; }
  .header-left h1 .skill-name { color: #38bdf8; }
  .header-left .meta { font-size: 0.75rem; color: #94a3b8; margin-top: 0.2rem; }
  .status-badge {
    display: inline-flex; align-items: center; gap: 0.35rem;
    padding: 0.4rem 1rem; border-radius: 9999px; font-size: 0.8rem; font-weight: 700;
    letter-spacing: 0.025em; text-transform: uppercase;
  }
  .status-badge.pass { background: rgba(22,163,74,0.2); color: #4ade80; border: 1px solid rgba(22,163,74,0.4); }
  .status-badge.warn { background: rgba(217,119,6,0.2); color: #fbbf24; border: 1px solid rgba(217,119,6,0.4); }
  .status-badge.fail  { background: rgba(220,38,38,0.2); color: #f87171; border: 1px solid rgba(220,38,38,0.4); }

  .main { max-width: 960px; margin: 0 auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1.5rem; }

  /* Context card */
  .context-card {
    background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); padding: 1.25rem 1.5rem;
  }
  .context-card .label {
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--text-muted); font-weight: 600; margin-bottom: 0.35rem;
  }
  .context-card .value {
    font-size: 0.85rem; color: var(--text-secondary); line-height: 1.6; word-break: break-word;
  }
  .context-card .value.prompt-text { font-style: italic; }
  .context-card .context-row { margin-bottom: 0.75rem; }
  .context-card .context-row:last-child { margin-bottom: 0; }

  /* Summary mini cards */
  .summary-mini {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 0.75rem;
  }
  .mini-card {
    background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 1rem 1.25rem; border-left: 4px solid var(--blue);
  }
  .mini-card.pass { border-left-color: var(--green); }
  .mini-card.time { border-left-color: var(--purple); }
  .mini-card .mini-label {
    font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--text-muted); font-weight: 600; margin-bottom: 0.35rem;
  }
  .mini-card .mini-value { font-size: 1.6rem; font-weight: 800; line-height: 1.1; }
  .mini-card .mini-delta {
    font-size: 0.72rem; font-weight: 600; display: inline-flex; align-items: center; gap: 0.2rem;
    padding: 0.15rem 0.5rem; border-radius: 9999px; margin-top: 0.4rem;
  }
  .mini-card .mini-delta.regression { background: var(--red-bg); color: var(--red); }
  .mini-card .mini-delta.improvement { background: var(--green-bg); color: var(--green); }
  .mini-card .mini-delta.neutral { background: #f3f4f6; color: var(--text-secondary); }
  .mini-card .mini-compare { display: flex; gap: 0.75rem; font-size: 0.72rem; color: var(--text-secondary); margin-top: 0.3rem; }
  .mini-card .mini-compare span { font-weight: 600; color: var(--text); }

  /* Comparison section */
  .comp-section {
    display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;
  }
  .comp-col {
    background: #f8fafc; border-radius: var(--radius-sm); padding: 1rem; border: 1px solid var(--border);
  }
  .comp-col.current-col { border-left: 3px solid var(--blue); }
  .comp-col.baseline-col { border-left: 3px solid #94a3b8; }
  .comp-col .comp-label {
    font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.06em;
    font-weight: 700; margin-bottom: 0.5rem;
  }
  .comp-col.current-col .comp-label { color: var(--blue); }
  .comp-col.baseline-col .comp-label { color: #64748b; }
  .comp-mini-stats { display: flex; gap: 1rem; font-size: 0.78rem; }
  .comp-mini-stat .stat-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; }
  .comp-mini-stat .stat-value { font-weight: 700; font-size: 0.95rem; }

  .pass-rate-bar { height: 8px; background: #e5e7eb; border-radius: 9999px; overflow: hidden; margin-top: 0.4rem; display: flex; }
  .pass-rate-bar .pass-segment { background: var(--green); transition: width 0.3s ease; }
  .pass-rate-bar .fail-segment { background: var(--red); transition: width 0.3s ease; }

  /* Assertion table */
  .assertion-section { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .assertion-section h2 { font-size: 0.95rem; font-weight: 700; padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); }
  .assertion-table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
  .assertion-table thead th {
    text-align: left; padding: 0.6rem 0.75rem; background: #f8fafc;
    border-bottom: 2px solid var(--border); font-weight: 600; font-size: 0.7rem;
    text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-secondary);
  }
  .assertion-table thead th.col-cfg { text-align: center; width: 64px; }
  .assertion-table thead th.col-current { color: var(--blue); }
  .assertion-table thead th.col-baseline { color: var(--text-muted); }
  .assertion-table tbody td { padding: 0.6rem 0.75rem; border-bottom: 1px solid var(--border); vertical-align: top; }
  .assertion-table tbody tr:hover { background: #fafafa; }
  .assertion-table tbody tr.regression-row { background: var(--red-bg); }
  .assertion-table tbody tr.regression-row:hover { background: #fee2e2; }
  .assertion-text { line-height: 1.4; font-weight: 500; }
  .assertion-evidence { font-size: 0.68rem; color: var(--text-muted); margin-top: 0.12rem; line-height: 1.3; word-break: break-word; }

  .result-cell { text-align: center; }
  .result-badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 26px; height: 26px; border-radius: 8px; font-weight: 700; font-size: 0.8rem;
  }
  .result-badge.pass { background: var(--green-bg); color: var(--green); }
  .result-badge.fail { background: var(--red-bg); color: var(--red); }

  /* Notes */
  .notes-section { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); padding: 1rem 1.25rem; }
  .notes-section h2 { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.6rem; }
  .note-item {
    padding: 0.4rem 0.6rem; border-radius: var(--radius-sm); margin-bottom: 0.3rem;
    font-size: 0.8rem; line-height: 1.5;
  }
  .note-item.regression-note { background: var(--red-bg); color: var(--red); font-weight: 600; }
  .note-item.info-note { background: var(--blue-bg); color: #1e40af; }

  .footer { text-align: center; padding: 1.5rem; font-size: 0.7rem; color: var(--text-muted); }

  @media (max-width: 640px) {
    .comp-section { grid-template-columns: 1fr; }
    .header { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Skill Guard: <span class="skill-name" id="skillName">--</span></h1>
    <div class="meta" id="reportMeta">--</div>
  </div>
  <div class="header-right">
    <span class="status-badge" id="overallStatus">--</span>
  </div>
</div>

<div class="main">
  <!-- Context -->
  <section class="context-card" id="contextCard">
    <div class="context-row">
      <div class="label">Eval Case</div>
      <div class="value" id="evalName" style="font-weight:600;color:var(--text)">--</div>
    </div>
    <div class="context-row">
      <div class="label">Prompt</div>
      <div class="value prompt-text" id="evalPrompt">--</div>
    </div>
    <div class="context-row">
      <div class="label">Expected Output</div>
      <div class="value" id="evalExpected">--</div>
    </div>
  </section>

  <!-- Summary mini cards -->
  <section class="summary-mini">
    <div class="mini-card pass">
      <div class="mini-label">Pass Rate</div>
      <div class="mini-value" id="passRateVal">--</div>
      <span class="mini-delta" id="passRateDelta">--</span>
      <div class="mini-compare">
        <span>Current <span id="currPR">--</span></span>
        <span>Baseline <span id="basePR">--</span></span>
      </div>
    </div>
  </section>

  <!-- Side-by-side comparison -->
  <section class="comp-section" id="compSection"></section>

  <!-- Assertion table -->
  <section class="assertion-section">
    <h2>Assertions</h2>
    <table class="assertion-table">
      <thead><tr>
        <th>Assertion</th>
        <th class="col-cfg col-current">Current</th>
        <th class="col-cfg col-baseline">Baseline</th>
      </tr></thead>
      <tbody id="assertionBody"></tbody>
    </table>
  </section>

  <!-- Notes -->
  <section class="notes-section" id="notesCard">
    <h2>Notes</h2>
    <div id="notesContent"></div>
  </section>

  <div class="footer">Skill Guard — Per-Eval Report</div>
</div>

<script id="benchmark-data" type="application/json">
__BENCHMARK_DATA__
</script>

<script>
(function() {
  var dataEl = document.getElementById('benchmark-data');
  if (!dataEl || !dataEl.textContent.trim()) {
    document.getElementById('skillName').textContent = 'No data';
    return;
  }

  var bm;
  try { bm = JSON.parse(dataEl.textContent.trim()); } catch(e) {
    document.getElementById('skillName').textContent = 'Parse error: ' + e.message;
    return;
  }

  var meta = bm.metadata || {};
  var runs = bm.runs || [];
  var summary = bm.run_summary || {};
  var notes = bm.notes || [];

  var configs = Object.keys(summary).filter(function(k) { return k !== 'delta'; });
  var currentCfg = configs[0] || 'current';
  var baselineCfg = configs[1] || 'baseline';

  var currStats = summary[currentCfg] || {};
  var baseStats = summary[baselineCfg] || {};
  var delta = summary.delta || {};

  function fmtPct(v) { return v != null ? (v * 100).toFixed(1) : '--'; }
  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // Header
  var evalIds = meta.evals_run || [];
  var evalId = evalIds[0] || 0;
  var evalName = (runs[0] && runs[0].eval_name) || ('Eval #' + evalId);
  document.getElementById('skillName').textContent = meta.skill_name || 'Unknown';
  document.getElementById('reportMeta').textContent = 'Eval #' + evalId + '  |  ' + evalName + '  |  ' + (meta.timestamp || '');
  document.getElementById('evalName').textContent = evalName;
  document.getElementById('evalPrompt').textContent = runs[0] ? runs[0].prompt : '--';
  document.getElementById('evalExpected').textContent = runs[0] ? runs[0].expected_output : '--';

  // Summary cards
  var currPR = currStats.pass_rate ? currStats.pass_rate.mean : null;
  var basePR = baseStats.pass_rate ? baseStats.pass_rate.mean : null;
  var dPR = delta.pass_rate ? parseFloat(delta.pass_rate) : (currPR != null && basePR != null ? currPR - basePR : null);

  document.getElementById('passRateVal').textContent = fmtPct(currPR) + '%';
  document.getElementById('currPR').textContent = fmtPct(currPR) + '%';
  document.getElementById('basePR').textContent = fmtPct(basePR) + '%';

  function setDelta(id, val, suffix, worseUp) {
    var el = document.getElementById(id);
    if (val == null) { el.textContent = '--'; el.className = 'mini-delta neutral'; return; }
    var sign = val >= 0 ? '+' : '';
    el.textContent = sign + val.toFixed(1) + (suffix || '');
    var bad = worseUp ? (val > 0.5) : (val < -0.01);
    var good = worseUp ? (val < -0.5) : (val > 0.01);
    if (bad) el.className = 'mini-delta regression';
    else if (good) el.className = 'mini-delta improvement';
    else el.className = 'mini-delta neutral';
  }

  setDelta('passRateDelta', dPR, 'pp', false);

  // Status badge
  var statusEl = document.getElementById('overallStatus');
  var isDegraded = dPR != null && dPR < -0.01;
  if (isDegraded) {
    statusEl.textContent = '\u26A0 REGRESSION';
    statusEl.className = 'status-badge fail';
  } else {
    statusEl.textContent = '\u2713 PASS';
    statusEl.className = 'status-badge pass';
  }

  // Comparison section
  var currRun = runs.filter(function(r) { return r.configuration === currentCfg; })[0] || {};
  var baseRun = runs.filter(function(r) { return r.configuration === baselineCfg; })[0] || {};
  var cRes = currRun.result || {};
  var bRes = baseRun.result || {};
  var cPct = cRes.total > 0 ? (cRes.passed / cRes.total * 100) : 0;
  var bPct = bRes.total > 0 ? (bRes.passed / bRes.total * 100) : 0;

  document.getElementById('compSection').innerHTML =
    '<div class="comp-col current-col">' +
      '<div class="comp-label">Current</div>' +
      '<div class="comp-mini-stats">' +
        '<div class="comp-mini-stat"><div class="stat-label">Pass</div><div class="stat-value" style="color:#16a34a">' + (cRes.passed||0) + '/' + (cRes.total||0) + '</div></div>' +
      '</div>' +
      '<div class="pass-rate-bar"><div class="pass-segment" style="width:' + cPct + '%"></div><div class="fail-segment" style="width:' + (100-cPct) + '%"></div></div>' +
    '</div>' +
    '<div class="comp-col baseline-col">' +
      '<div class="comp-label">Baseline</div>' +
      '<div class="comp-mini-stats">' +
        '<div class="comp-mini-stat"><div class="stat-label">Pass</div><div class="stat-value" style="color:#16a34a">' + (bRes.passed||0) + '/' + (bRes.total||0) + '</div></div>' +
      '</div>' +
      '<div class="pass-rate-bar"><div class="pass-segment" style="width:' + bPct + '%"></div><div class="fail-segment" style="width:' + (100-bPct) + '%"></div></div>' +
    '</div>';

  // Assertion table
  var cExps = currRun.expectations || [];
  var bExps = baseRun.expectations || [];
  var expMap = {};
  for (var i = 0; i < cExps.length; i++) {
    var e = cExps[i];
    expMap[e.text] = { text: e.text, currPassed: e.passed, currEvidence: e.evidence || '', basePassed: null, baseEvidence: '' };
  }
  for (var i = 0; i < bExps.length; i++) {
    var e = bExps[i];
    if (expMap[e.text]) { expMap[e.text].basePassed = e.passed; expMap[e.text].baseEvidence = e.evidence || ''; }
    else expMap[e.text] = { text: e.text, currPassed: null, currEvidence: '', basePassed: e.passed, baseEvidence: e.evidence || '' };
  }

  var rows = '';
  Object.keys(expMap).forEach(function(key) {
    var exp = expMap[key];
    var cP = exp.currPassed, bP = exp.basePassed;
    var isReg = (cP === false && bP === true);
    rows += '<tr' + (isReg ? ' class="regression-row"' : '') + '>' +
      '<td><div class="assertion-text">' + esc(exp.text) + '</div>' +
      '<div class="assertion-evidence">' +
        (exp.currEvidence ? '<span style="color:#2563eb">C:</span> ' + esc(exp.currEvidence) : '') +
        (exp.currEvidence && exp.baseEvidence ? ' | ' : '') +
        (exp.baseEvidence ? '<span style="color:#94a3b8">B:</span> ' + esc(exp.baseEvidence) : '') +
      '</div></td>' +
      '<td class="result-cell"><span class="result-badge ' + (cP ? 'pass' : 'fail') + '">' + (cP ? '\u2713' : '\u2717') + '</span></td>' +
      '<td class="result-cell"><span class="result-badge ' + (bP ? 'pass' : 'fail') + '">' + (bP ? '\u2713' : '\u2717') + '</span></td>' +
      '</tr>';
  });
  document.getElementById('assertionBody').innerHTML = rows;

  // Notes
  if (notes.length > 0) {
    document.getElementById('notesContent').innerHTML = notes.map(function(n) {
      var isReg = /regression|退化|下降/i.test(n);
      return '<div class="note-item ' + (isReg ? 'regression-note' : 'info-note') + '">' + esc(n) + '</div>';
    }).join('');
  } else {
    document.getElementById('notesContent').innerHTML = '<div class="note-item info-note">No issues detected.</div>';
  }
})();
</script>

</body>
</html>
